<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyve — Loading</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    background: #0a0010;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: sans-serif;
  }

  /* === 背景漸層光暈 === */
  .bg-glow {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 55%,
      rgba(140, 40, 200, 0.18) 0%,
      rgba(80, 0, 140, 0.10) 45%,
      transparent 100%);
    animation: bgPulse 2s ease-out forwards;
    opacity: 0;
  }

  @keyframes bgPulse {
    0%   { opacity: 0; transform: scale(0.8); }
    40%  { opacity: 1; transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* === 粒子容器 === */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: particleFly var(--dur) var(--delay) ease-out forwards;
    opacity: 0;
  }

  @keyframes particleFly {
    0%   { opacity: 0; transform: translate(0, 0) scale(0); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(var(--s)); }
  }

  /* === 主舞台 === */
  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* === Logo 容器 === */
  .logo-wrap {
    position: relative;
    animation: logoEntrance 0.85s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  @keyframes logoEntrance {
    0%   { opacity: 0; transform: scale(0.72) translateY(16px); filter: blur(8px); }
    60%  { opacity: 1; filter: blur(0); }
    80%  { transform: scale(1.04) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
  }

  .logo-img {
    width: 280px;
    height: auto;
    display: block;
    filter: drop-shadow(0 0 28px rgba(200, 80, 255, 0.55))
            drop-shadow(0 0 8px rgba(255, 80, 220, 0.4));
    animation: logoGlow 2s ease-in-out 0.8s forwards;
  }

  @keyframes logoGlow {
    0%   { filter: drop-shadow(0 0 28px rgba(200, 80, 255, 0.55)) drop-shadow(0 0 8px rgba(255, 80, 220, 0.4)); }
    50%  { filter: drop-shadow(0 0 48px rgba(200, 80, 255, 0.85)) drop-shadow(0 0 20px rgba(255, 80, 220, 0.7)); }
    100% { filter: drop-shadow(0 0 32px rgba(200, 80, 255, 0.65)) drop-shadow(0 0 12px rgba(255, 80, 220, 0.5)); }
  }

  /* === 光掃效果 === */
  .sweep {
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(105deg,
      transparent 30%,
      rgba(255, 255, 255, 0.18) 50%,
      transparent 70%);
    border-radius: 50%;
    animation: sweep 0.6s ease-in-out 0.75s forwards;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes sweep {
    0%   { left: -80%; opacity: 0; }
    10%  { opacity: 1; }
    100% { left: 130%; opacity: 0; }
  }

  /* === 載入點 === */
  .dots {
    display: flex;
    gap: 8px;
    animation: fadeInUp 0.5s ease-out 1.1s both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(200, 100, 255, 0.6);
    animation: dotPulse 1s ease-in-out var(--d) infinite alternate;
  }

  @keyframes dotPulse {
    from { transform: scale(0.7); opacity: 0.4; background: rgba(200, 100, 255, 0.5); }
    to   { transform: scale(1.3); opacity: 1;   background: rgba(230, 140, 255, 1); }
  }

  /* === 底部 tagline === */
  .tagline {
    font-size: 11px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: rgba(200, 140, 255, 0.55);
    animation: fadeInUp 0.6s ease-out 1.3s both;
    font-weight: 300;
  }

  /* === 整體淡出（2s 後） === */
  body.fade-out {
    animation: screenFade 0.45s ease-in forwards;
  }
  @keyframes screenFade {
    to { opacity: 0; }
  }
</style>
</head>

  <div class="dots">
    <div class="dot" style="--d:0s"></div>
    <div class="dot" style="--d:0.18s"></div>
    <div class="dot" style="--d:0.36s"></div>
  </div>

  <div class="tagline">Your Live Music Universe</div>
</div>

<script>
  // 動態生成粒子
  const container = document.getElementById('particles');
  const colors = [
    'rgba(220, 100, 255, 0.9)',
    'rgba(180, 60, 240, 0.8)',
    'rgba(255, 140, 240, 0.7)',
    'rgba(255, 255, 255, 0.85)',
    'rgba(160, 80, 255, 0.75)',
  ];

  for (let i = 0; i < 28; i++) {
    const el = document.createElement('div');
    el.className = 'particle';

    const size = 2 + Math.random() * 4;
    const angle = Math.random() * 360;
    const dist = 80 + Math.random() * 220;
    const tx = Math.cos(angle * Math.PI / 180) * dist;
    const ty = Math.sin(angle * Math.PI / 180) * dist;

    el.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      left: calc(50% + ${(Math.random() - 0.5) * 60}px);
      top: calc(42% + ${(Math.random() - 0.5) * 40}px);
      --tx: ${tx}px;
      --ty: ${ty}px;
      --s: ${0.3 + Math.random() * 0.7};
      --dur: ${0.8 + Math.random() * 0.7}s;
      --delay: ${0.3 + Math.random() * 0.6}s;
      box-shadow: 0 0 ${size * 2}px ${colors[Math.floor(Math.random() * colors.length)]};
    `;
    container.appendChild(el);
  }

  // 2 秒後淡出（用於預覽循環）
  setTimeout(() => {
    document.body.classList.add('fade-out');
    setTimeout(() => {
      document.body.classList.remove('fade-out');
      document.body.style.animation = 'none';
      // 重播
      location.reload();
    }, 450);
  }, 2200);
</script>
